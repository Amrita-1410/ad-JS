<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crud Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="asset/custom/css/style.css"/>
</head>
<body>
    <h3 class="title">Crud Application</h3>
    <div class="d-flex justify-content-center">
    <div class="container d-flex m-1">
        
        <div class="col-4 form">
            <form autocomplete="off">
                <div>
                    <label>Full name</label>
                    <input type="text" name="fullname" id="fullname" placeholder="Enter your name">
                </div>
                <div>
                    <label>Student Code</label>
                    <input type="text" name="Scode" id="scode" placeholder="Enter code">
                </div>
                <div>
                    <label>Choose your course :</label>

                    <select name="course" id="course">
                    <option value="mern-stack">Mern Stack</option>
                    <option value="python">Python</option>
                    <option value="ui-ux">UI/UX</option>
                    <option value="data-science">Data Science</option>
                    </select>
                </div>
                <div class="action-button">
                        <input type="submit" value="Submit">
                    </div>
            </form>
        </div>
        <div class="col-6">
            <input class="search" type="text" id="searchInput" placeholder="Search..." onkeyup="searchProducts()">
            
            <table class="list" id="studentlist">
                <thead>
                    <th>Full name</th>
                    <th>Student code</th>
                    <th>Course</th>
                    <th>Action</th>
                </thead>
                <tbody>
                    
                </tbody>

            </table>
        </div>
    </div>
    </div>
    <script src="asset/custom/js/script.js"></script>
</body>
</html>
